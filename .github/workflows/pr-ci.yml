name: PR CI

on:
  pull_request:
    branches: [ "main" ]

# Least-privilege token — this workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs for the same PR.
concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Compile (wasmJs + Android) & run unit tests
        run: >-
          ./gradlew
          :asgard:compileKotlinWasmJs
          :asgard:compileAndroidMain
          :asgard:testAndroidHostTest
          :demo:compileKotlinWasmJs
          --stacktrace
